<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  body { font-family: 'Schibsted Grotesk', system-ui, sans-serif; background: #0a0a0c; color: #f5f3ed; transition: background 0.25s, color 0.25s; }
  body[data-theme="light"] { background: #f7f6f2; color: #1a1815; }
  #root { width: 100vw; height: 100vh; }
  * { box-sizing: border-box; }
  input, select, textarea, button { font-family: inherit; }
  input:focus, select:focus, textarea:focus { outline: none; }
  *::-webkit-scrollbar { width: 6px; height: 6px; }
  *::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.2); border-radius: 3px; }
  *::-webkit-scrollbar-track { background: transparent; }

  /* Loading splash */
  .splash { position: fixed; inset: 0; display: grid; place-items: center; background: inherit; z-index: 9999; }
  .splash-spinner { width: 44px; height: 44px; border: 3px solid rgba(212,168,83,0.18); border-top-color: #d4a853; border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
  @keyframes toast-in { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }

  /* LOGIN PAGE */
  .login-page {
    position: fixed; inset: 0; overflow: hidden;
    display: grid; place-items: center;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(212,168,83,0.10), transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(59,130,246,0.06), transparent 50%),
      #0a0a0c;
  }
  body[data-theme="light"] .login-page {
    background:
      radial-gradient(ellipse at 20% 20%, rgba(168,127,53,0.12), transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(44,102,197,0.08), transparent 50%),
      #f7f6f2;
  }
  .login-page::before {
    content: ""; position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
  }
  .login-card {
    position: relative;
    width: min(420px, 90vw);
    background: rgba(17,17,19,0.7);
    backdrop-filter: blur(40px) saturate(180%);
    -webkit-backdrop-filter: blur(40px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 20px;
    padding: 40px 36px 32px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
    animation: fade-in .35s ease-out;
  }
  body[data-theme="light"] .login-card {
    background: rgba(255,255,255,0.7);
    border: 1px solid rgba(0,0,0,0.06);
    box-shadow: 0 30px 80px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.5);
  }
  .login-logo {
    width: 56px; height: 56px;
    border-radius: 14px;
    background: linear-gradient(140deg, #d4a853, #a88436);
    display: grid; place-items: center;
    color: #0a0a0c; font-size: 24px; font-weight: 700; letter-spacing: -0.04em;
    margin-bottom: 24px;
    box-shadow: 0 6px 24px rgba(212,168,83,0.35);
  }
  body[data-theme="light"] .login-logo { color: #fff; box-shadow: 0 6px 24px rgba(168,127,53,0.35); }
  .login-title { margin: 0 0 4px; font-size: 28px; font-weight: 500; letter-spacing: -0.025em; color: #f5f3ed; }
  body[data-theme="light"] .login-title { color: #1a1815; }
  .login-sub { font-size: 13.5px; color: #a0a0a8; margin-bottom: 28px; }
  body[data-theme="light"] .login-sub { color: #555048; }
  .login-label { display: block; font-size: 11.5px; font-weight: 500; color: #a0a0a8; letter-spacing: 0.02em; margin-bottom: 7px; }
  body[data-theme="light"] .login-label { color: #555048; }
  .login-input-wrap { position: relative; }
  .login-input {
    width: 100%; padding: 13px 14px 13px 42px;
    background: rgba(10,10,12,0.6);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    font-size: 14px; color: #f5f3ed;
    transition: border-color .15s, background .15s;
  }
  body[data-theme="light"] .login-input { background: rgba(255,255,255,0.6); border-color: rgba(0,0,0,0.08); color: #1a1815; }
  .login-input:focus { border-color: #d4a853; background: rgba(10,10,12,0.85); }
  body[data-theme="light"] .login-input:focus { background: rgba(255,255,255,0.9); border-color: #a87f35; }
  .login-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #6b6b75; }
  .login-btn {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, #d4a853, #a88436);
    color: #0a0a0c; border: none; border-radius: 10px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    margin-top: 22px;
    box-shadow: 0 8px 24px rgba(212,168,83,0.25);
    transition: transform .15s, box-shadow .15s;
  }
  body[data-theme="light"] .login-btn { color: #fff; box-shadow: 0 8px 24px rgba(168,127,53,0.25); }
  .login-btn:hover { transform: translateY(-1px); box-shadow: 0 12px 32px rgba(212,168,83,0.4); }
  .login-btn:disabled { opacity: 0.7; cursor: wait; transform: none; }
  .login-error {
    padding: 10px 14px;
    background: rgba(239,68,68,0.12);
    border: 1px solid rgba(239,68,68,0.30);
    color: #ef4444;
    border-radius: 8px;
    font-size: 12.5px;
    margin-top: 14px;
  }
  .login-footer {
    margin-top: 24px; padding-top: 18px;
    border-top: 1px solid rgba(255,255,255,0.06);
    font-size: 11.5px; color: #6b6b75; text-align: center;
    letter-spacing: 0.06em; text-transform: uppercase;
  }
  body[data-theme="light"] .login-footer { border-color: rgba(0,0,0,0.06); color: #8a847b; }

  /* Print */
  @media (max-width: 768px) {
    [data-app-sidebar] { display: none !important; }
    [data-app-sidebar-overlay] { display: block !important; }
  }
  @media print {
    body * { visibility: hidden; }
    .print-area, .print-area * { visibility: visible; }
    .print-area { position: absolute; left: 0; top: 0; width: 100%; padding: 30px; color: #000; background: #fff; }
  }
</style>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// =====================================================
// LOGIN PAGE
// =====================================================
const LoginPage = ({ onLogin }) => {
  const [pwd, setPwd] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);
  const inputRef = useRef(null);

  useEffect(() => { inputRef.current?.focus(); }, []);

  const submit = async (e) => {
    e?.preventDefault();
    setError('');
    setLoading(true);
    try {
      // Client-side password check вҶ’ВҖВ” server hali deploy qilinmagan bo'lsa ham ishlaydi
      if (pwd !== window.__PASSWORD) {
        setError('Parol noto\'g\'ri. Qaytadan urinib ko\'ring.');
        setLoading(false);
        return;
      }
      sessionStorage.setItem('bemorlar_auth', '1');
      onLogin();
    } catch (err) {
      setError('Xato: ' + (err.message || err));
    } finally { setLoading(false); }
  };

  return (
    <div className="login-page">
      <form className="login-card" onSubmit={submit}>
        <div className="login-logo">B</div>
        <h1 className="login-title">Bemorlar</h1>
        <div className="login-sub">Klinika tizimi В· kirish uchun parolni kiriting</div>

        <label className="login-label">Parol</label>
        <div className="login-input-wrap">
          <svg className="login-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input
            ref={inputRef}
            type="password"
            className="login-input"
            placeholder="вҖўвҖўвҖўвҖўвҖўвҖўвҖўвҖўвҖўвҖў"
            value={pwd}
            onChange={e => setPwd(e.target.value)}
            autoComplete="current-password"
          />
        </div>

        {error && <div className="login-error">вҶ’ВҡВ  {error}</div>}

        <button type="submit" className="login-btn" disabled={loading || !pwd}>
          {loading ? 'Tekshirilmoqda...' : 'Kirish вҶ’'}
        </button>

        <div className="login-footer">
          Bemorlar v2.0 В· Premium
        </div>
      </form>
    </div>
  );
};

// =====================================================
// MAIN APP (after login)
// =====================================================
const MainApp = ({ onLogout, showToast }) => {
  const [page, setPage] = useState('dashboard');
  const [bemorlar, setBemorlar] = useState([]);
  const [stats, setStats] = useState(null);
  const [loading, setLoading] = useState(true);
  const [selectedId, setSelectedId] = useState(null);
  const [editing, setEditing] = useState(null); // bemor obj for edit mode
  const [deleting, setDeleting] = useState(null);

  const api = window.getAPI();
  const selectedBemor = selectedId ? bemorlar.find(b => b.id === selectedId) : null;

  const refresh = useCallback(async () => {
    try {
      const [list, st] = await Promise.all([api.getBemorlar(), api.getStats()]);
      setBemorlar(list || []);
      setStats(st || null);
    } catch (err) {
      showToast('Ma\'lumot yuklanmadi: ' + (err.message || err), 'error');
    } finally { setLoading(false); }
  }, [api, showToast]);

  useEffect(() => { refresh(); }, [refresh]);

  // Cmd+K to focus search вҶ’ВҖВ” handled via PageHeader
  useEffect(() => {
    const h = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        setPage('bemorlar');
      }
    };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, []);

  // Handlers
  const handleNav = (id) => {
    if (['terapiya', 'xirurgiya', 'ortodontiya', 'ortopediya'].includes(id)) {
      setPage('bemorlar');
      // Could filter by dept вҶ’ВҖВ” skipping for now
      return;
    }
    setPage(id);
  };
  const handleSelect = (id) => setSelectedId(id);
  const handleFormSave = async (saved) => {
    showToast(`вҶ’ВңВ“ "${saved.ism}" muvaffaqiyatli saqlandi`, 'success');
    await refresh();
    setPage('bemorlar');
    setSelectedId(saved.id);
  };
  const handleEdit = (bemor) => {
    setSelectedId(null);
    setEditing(bemor);
  };
  const handleEditSave = async (saved) => {
    showToast(`вҶ’ВңВ“ "${saved.ism}" yangilandi`, 'success');
    await refresh();
    setEditing(null);
    setSelectedId(saved.id);
  };
  const handleDelete = (bemor) => {
    setSelectedId(null);
    setDeleting(bemor);
  };
  const confirmDelete = async () => {
    if (!deleting) return;
    try {
      await api.deleteBemor(deleting.id);
      showToast(`вҶ’ВңВ“ "${deleting.ism}" o'chirildi`, 'success');
      setDeleting(null);
      await refresh();
    } catch (err) {
      showToast('O\'chirishda xato: ' + (err.message || err), 'error');
    }
  };
  const handlePrint = () => window.print();

  if (loading) return <div className="splash"><div className="splash-spinner" /></div>;

  if (editing) {
    return <window.FormPage onCancel={() => setEditing(null)} onSave={handleEditSave} initial={editing} mode="edit" />;
  }

  let body;
  if (page === 'dashboard') body = <window.DashboardPage onNav={handleNav} onSelect={handleSelect} bemorlar={bemorlar} stats={stats} />;
  else if (page === 'bemorlar') body = <window.BemorlarPage onNav={handleNav} onSelect={handleSelect} bemorlar={bemorlar} />;
  else if (page === 'form') body = <window.FormPage onCancel={() => setPage('bemorlar')} onSave={handleFormSave} />;
  else if (page === 'stats') body = <window.StatsPage stats={stats} bemorlar={bemorlar} />;

  return (
    <div style={{ display: 'flex', width: '100%', height: '100%' }}>
      <window.AppSidebar active={page} onNav={handleNav} onLogout={onLogout} />
      {body}
      {selectedBemor && <window.KartaModal bemor={selectedBemor} onClose={() => setSelectedId(null)} onEdit={handleEdit} onDelete={handleDelete} onPrint={handlePrint} />}
      <window.ConfirmModal
        open={!!deleting}
        title="Bemorni o'chirish"
        message={deleting ? `"${deleting.ism}" yozuvini butunlay o'chirmoqchimisiz? Bu amalni qaytarib bo'lmaydi.` : ""}
        onConfirm={confirmDelete}
        onCancel={() => setDeleting(null)}
        confirmText="O'chirish"
        danger
      />
    </div>
  );
};

// =====================================================
// ROOT
// =====================================================
const App = () => {
  const [theme, setTheme] = useState(() => localStorage.getItem('bemorlar_theme') || 'dark');
  const [authed, setAuthed] = useState(() => sessionStorage.getItem('bemorlar_auth') === '1');
  const [toast, setToast] = useState(null);

  useEffect(() => {
    document.body.dataset.theme = theme;
    localStorage.setItem('bemorlar_theme', theme);
  }, [theme]);

  const showToast = useCallback((message, type = 'success') => {
    setToast({ message, type, id: Date.now() });
  }, []);

  // Expose globally so api.js auto-fallback can notify user
  useEffect(() => { window.__showToast = showToast; }, [showToast]);

  const handleLogout = () => {
    sessionStorage.removeItem('bemorlar_auth');
    setAuthed(false);
  };

  return (
    <window.PremiumThemeContext.Provider value={{ theme, setTheme }}>
      {authed
        ? <MainApp onLogout={handleLogout} showToast={showToast} />
        : <LoginPage onLogin={() => setAuthed(true)} />
      }
      {toast && <window.Toast key={toast.id} message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
    </window.PremiumThemeContext.Provider>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
